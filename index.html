<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AML Portfolio - Analyst Workspace</title>
    <!-- Imports Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Imports Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* Smooth fade-in for tabs */
        .tab-content { display: none; animation: fadeIn 0.4s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Sleek Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-300 font-sans selection:bg-blue-500/30 flex flex-col md:flex-row min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-full md:w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
        <div class="p-6 border-b border-slate-800">
            <div class="flex items-center gap-3 text-slate-100 mb-1">
                <i data-lucide="shield" class="text-blue-500 w-7 h-7"></i>
                <h1 class="text-xl font-bold tracking-tight">AML<span class="text-blue-500 font-light">Portfolio</span></h1>
            </div>
            <p class="text-xs text-slate-500 uppercase tracking-wider font-semibold">Analyst Workspace</p>
        </div>

        <div class="p-4 flex flex-col gap-4">
            <div class="mb-4">
                <h2 class="text-sm font-semibold text-slate-100 mb-1" id="ui-name"></h2>
                <p class="text-xs text-blue-400" id="ui-title"></p>
            </div>
            
            <div class="space-y-2 mb-6">
                <a href="#" class="flex items-center gap-2 text-xs text-slate-400 hover:text-slate-200 transition-colors">
                    <i data-lucide="mail" class="w-3.5 h-3.5"></i> <span id="ui-email"></span>
                </a>
                <a href="#" class="flex items-center gap-2 text-xs text-slate-400 hover:text-slate-200 transition-colors">
                    <i data-lucide="linkedin" class="w-3.5 h-3.5"></i> <span id="ui-linkedin"></span>
                </a>
                <a href="#" class="flex items-center gap-2 text-xs text-slate-400 hover:text-slate-200 transition-colors">
                    <i data-lucide="github" class="w-3.5 h-3.5"></i> <span id="ui-github"></span>
                </a>
            </div>
        </div>

        <nav class="flex-grow flex flex-col">
            <p class="px-4 text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Modules</p>
            
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors bg-blue-600/10 text-blue-400 border-r-2 border-blue-500">
                <i data-lucide="activity" class="w-[18px] h-[18px]"></i> Investigations
            </button>
            
            <button onclick="switchTab('intel')" id="nav-intel" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-slate-400 hover:bg-slate-800 hover:text-slate-200">
                <i data-lucide="network" class="w-[18px] h-[18px]"></i> Skills & Intelligence
            </button>
            
            <button onclick="switchTab('dossier')" id="nav-dossier" class="nav-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-colors text-slate-400 hover:bg-slate-800 hover:text-slate-200">
                <i data-lucide="user-check" class="w-[18px] h-[18px]"></i> Analyst Dossier
            </button>
        </nav>

        <div class="p-4 border-t border-slate-800 text-xs text-slate-600 flex items-center justify-between mt-auto">
            <span>System Status:</span>
            <span class="flex items-center gap-1 text-emerald-500">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> SECURE
            </span>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-grow p-4 md:p-8 overflow-y-auto bg-slate-900">
        <div class="max-w-5xl mx-auto">
            
            <header class="mb-8 flex justify-between items-end border-b border-slate-800 pb-4">
                <div>
                    <h2 class="text-2xl font-semibold text-slate-100" id="page-title">Active Investigations</h2>
                    <p class="text-sm text-slate-500 mt-1">Classified portfolio viewing environment.</p>
                </div>
            </header>

            <div class="pb-12">
                
                <!-- TAB 1: INVESTIGATIONS (DASHBOARD) -->
                <div id="tab-dashboard" class="tab-content active space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="kpi-container"></div>
                    
                    <div class="bg-slate-800 border border-slate-700 rounded-lg shadow-sm overflow-hidden">
                        <div class="border-b border-slate-700 bg-slate-800/50 p-4 flex items-center gap-3">
                            <i data-lucide="search" class="text-blue-400 w-5 h-5"></i>
                            <h3 class="font-semibold text-slate-200 tracking-wide text-sm uppercase">Active Investigations (Projects)</h3>
                        </div>
                        <div class="p-5 space-y-4" id="projects-container"></div>
                    </div>
                </div>

                <!-- TAB 2: INTELLIGENCE -->
                <div id="tab-intel" class="tab-content grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-slate-800 border border-slate-700 rounded-lg shadow-sm overflow-hidden h-fit">
                        <div class="border-b border-slate-700 bg-slate-800/50 p-4 flex items-center gap-3">
                            <i data-lucide="database" class="text-blue-400 w-5 h-5"></i>
                            <h3 class="font-semibold text-slate-200 tracking-wide text-sm uppercase">Core Technology Stack</h3>
                        </div>
                        <div class="p-5 space-y-6" id="skills-container"></div>
                    </div>

                    <div class="bg-slate-800 border border-slate-700 rounded-lg shadow-sm overflow-hidden h-fit">
                        <div class="border-b border-slate-700 bg-slate-800/50 p-4 flex items-center gap-3">
                            <i data-lucide="shield" class="text-blue-400 w-5 h-5"></i>
                            <h3 class="font-semibold text-slate-200 tracking-wide text-sm uppercase">Domain Expertise (AML / KYC)</h3>
                        </div>
                        <div class="p-5 space-y-4" id="expertise-container"></div>
                    </div>
                </div>

                <!-- TAB 3: DOSSIER -->
                <div id="tab-dossier" class="tab-content">
                    <div class="bg-slate-800 border border-slate-700 rounded-lg shadow-sm overflow-hidden">
                        <div class="border-b border-slate-700 bg-slate-800/50 p-4 flex items-center gap-3">
                            <i data-lucide="file-text" class="text-blue-400 w-5 h-5"></i>
                            <h3 class="font-semibold text-slate-200 tracking-wide text-sm uppercase">Analyst Profile</h3>
                        </div>
                        <div class="p-5">
                            <div class="prose prose-invert max-w-none text-slate-300" id="bio-container"></div>
                            
                            <div class="mt-8 p-4 bg-blue-900/20 border-l-4 border-blue-500 rounded-r-md">
                                <h4 class="text-blue-400 font-semibold mb-2 flex items-center gap-2">
                                    <i data-lucide="lock" class="w-4 h-4"></i> Clearance & Availability
                                </h4>
                                <ul class="list-disc list-inside text-sm text-slate-400 space-y-1" id="availability-container"></ul>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- ⚙️ DATA CONFIGURATION AND LOGIC -->
    <script>
        // --- EDIT YOUR INFO HERE ---
        const CONFIG = {
            profile: {
                name: "Alex Mercer",
                title: "AML Data Analyst",
                email: "alex.mercer@email.com",
                linkedin: "linkedin.com/in/amercer",
                github: "github.com/am-data"
            },
            kpis: [
                { label: "Rows Analyzed", value: "15.2M+", icon: "database", color: "text-blue-400", bg: "bg-blue-500/10" },
                { label: "False Positives Reduced", value: "35.4%", icon: "user-check", color: "text-emerald-400", bg: "bg-emerald-500/10" },
                { label: "Anomalies Flagged", value: "2,401", icon: "alert-triangle", color: "text-rose-400", bg: "bg-rose-500/10" }
            ],
            bio: [
                "I am a Data Analyst specializing in Anti-Money Laundering (AML) and financial crime detection. I sit at the intersection of data science, compliance, and cybersecurity.",
                "My primary focus is leveraging large-scale data to secure financial ecosystems. Whether it's a traditional banking infrastructure or a high-growth fintech startup, I build the analytical models and data pipelines required to monitor high-velocity transaction streams, identify illicit typologies, and optimize rules engines.",
                "I believe that effective compliance shouldn't mean drowning investigators in false positives. By applying rigorous statistical analysis and machine learning to transaction monitoring, I help financial institutions stay compliant while dramatically reducing operational overhead."
            ],
            availability: [
                "Currently seeking opportunities in FinTech, RegTech, or traditional Banking.",
                "Available for remote or hybrid deployment.",
                "Certified Anti-Money Laundering Specialist (CAMS)"
            ],
            skills: [
                { category: "Data Engineering & DB", items: ["SQL (Advanced)", "Snowflake", "PostgreSQL", "Neo4j (Graph)"] },
                { category: "Programming & Analytics", items: ["Python 3.x", "Pandas / NumPy", "Scikit-Learn", "Bash/Shell"] },
                { category: "Visualization & BI", items: ["Tableau", "Looker", "D3.js"] }
            ],
            expertise: [
                { title: "Transaction Monitoring (TM)", desc: "Tuning rules engines, optimizing thresholds, and analyzing velocity/volume alerts to identify structuring and layering." },
                { title: "Customer Due Diligence (CDD/EDD)", desc: "Automating risk scoring models for onboarding and continuous monitoring of high-risk entities and PEPs." },
                { title: "Blockchain Forensics", desc: "Tracing on-chain heuristics, identifying mixer usage, and mapping fiat off-ramps in crypto-native environments." },
                { title: "Regulatory Reporting", desc: "Building automated data pipelines to support Suspicious Activity Report (SAR) and Currency Transaction Report (CTR) generation." }
            ],
            projects: [
                {
                    title: "Transaction Monitoring Optimizer",
                    id: "TM-2024-ALPHA",
                    type: "Risk & Analytics",
                    desc: "Optimized AML alert thresholds using Python and SQL. Analyzed 2M+ historical transactions to reduce false-positive alerts by 35% without missing any historical SARs, saving the investigations team 40+ hours per week.",
                    tech: ["Python", "SQL", "Pandas", "Tableau"],
                    impact: "High",
                    link: "https://github.com",
                    embedUrl: "" 
                },
                {
                    title: "Crypto Mule Network Graph",
                    id: "GRAPH-NET-BETA",
                    type: "Financial Forensics",
                    desc: "Built an interactive network visualization mapping hop-to-hop crypto and fiat transfers. Identified 3 previously undetected money muling rings by analyzing rapid velocity and bridging patterns.",
                    tech: ["Neo4j", "Cypher", "D3.js", "Snowflake"],
                    impact: "Critical",
                    link: "https://github.com"
                },
                {
                    title: "Automated KYC Risk Scoring",
                    id: "KYC-ML-01",
                    type: "Machine Learning",
                    desc: "Developed a Random Forest model to assign dynamic risk scores to new users during the CDD (Customer Due Diligence) onboarding phase, automatically routing high-risk entities for enhanced manual review.",
                    tech: ["Scikit-Learn", "XGBoost", "Jupyter", "AWS"],
                    impact: "Medium"
                }
            ]
        };

        // --- RENDER ENGINE (DO NOT TOUCH) ---
        function renderData() {
            // Profile
            document.getElementById('ui-name').innerText = CONFIG.profile.name;
            document.getElementById('ui-title').innerText = CONFIG.profile.title;
            document.getElementById('ui-email').innerText = CONFIG.profile.email;
            document.getElementById('ui-linkedin').innerText = CONFIG.profile.linkedin;
            document.getElementById('ui-github').innerText = CONFIG.profile.github;

            // KPIs
            document.getElementById('kpi-container').innerHTML = CONFIG.kpis.map(kpi => `
                <div class="bg-slate-800 border border-slate-700 p-4 rounded-lg flex items-center gap-4">
                    <div class="p-3 rounded-md ${kpi.bg} ${kpi.color}">
                        <i data-lucide="${kpi.icon}" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <p class="text-slate-400 text-xs font-semibold uppercase tracking-wider">${kpi.label}</p>
                        <p class="text-2xl font-bold text-slate-100">${kpi.value}</p>
                    </div>
                </div>
            `).join('');

            // Projects
            document.getElementById('projects-container').innerHTML = CONFIG.projects.map(p => {
                let impactColor = p.impact === 'Critical' ? 'bg-rose-500/20 text-rose-400 border border-rose-500/30' : 
                                  p.impact === 'High' ? 'bg-amber-500/20 text-amber-400 border border-amber-500/30' : 
                                  'bg-blue-500/20 text-blue-400 border border-blue-500/30';
                
                let html = `
                <div class="group border border-slate-700 bg-slate-800/30 rounded-lg p-5 hover:border-blue-500/50 transition-colors">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="text-lg font-semibold text-slate-100">${p.title}</h4>
                        <span class="text-xs font-bold px-2 py-1 rounded-full uppercase tracking-wider ${impactColor}">${p.impact} Impact</span>
                    </div>
                    <p class="text-slate-400 text-sm font-mono mb-3">ID: ${p.id} | TYPE: ${p.type}</p>
                    <p class="text-slate-300 text-sm leading-relaxed mb-4">${p.desc}</p>
                    <div class="flex gap-2 flex-wrap mb-4">
                        ${p.tech.map(t => `<span class="px-3 py-1 bg-slate-700/50 text-slate-300 text-sm rounded-md border border-slate-600">${t}</span>`).join('')}
                    </div>`;

                if(p.embedUrl || p.link) {
                    html += `<div class="mt-5 pt-5 border-t border-slate-700/50 flex flex-col gap-4">`;
                    if(p.embedUrl) {
                        html += `
                        <div class="w-full bg-slate-900 border border-slate-700 rounded-md overflow-hidden h-72 md:h-96 relative flex flex-col">
                            <div class="bg-slate-800/80 px-3 py-2 border-b border-slate-700 flex items-center gap-2">
                                <i data-lucide="layout-dashboard" class="text-blue-400 w-3.5 h-3.5"></i>
                                <span class="text-xs font-semibold tracking-wider text-slate-300 uppercase">Interactive Dashboard View</span>
                            </div>
                            <iframe src="${p.embedUrl}" class="w-full flex-grow border-0 bg-slate-100/5" allowfullscreen></iframe>
                        </div>`;
                    }
                    if(p.link) {
                        html += `
                        <div>
                            <a href="${p.link}" target="_blank" class="inline-flex items-center gap-2 text-sm font-medium text-blue-400 hover:text-blue-300 transition-colors bg-blue-500/10 hover:bg-blue-500/20 px-4 py-2 rounded-md border border-blue-500/20">
                                <i data-lucide="external-link" class="w-4 h-4"></i> View External Resource
                            </a>
                        </div>`;
                    }
                    html += `</div>`;
                }
                html += `</div>`;
                return html;
            }).join('');

            // Skills
            document.getElementById('skills-container').innerHTML = CONFIG.skills.map(s => `
                <div>
                    <h4 class="text-slate-400 text-xs font-semibold uppercase tracking-wider mb-3">${s.category}</h4>
                    <div class="flex flex-wrap gap-2">
                        ${s.items.map(item => `<span class="px-3 py-1 bg-slate-700/50 text-slate-300 text-sm rounded-md border border-slate-600">${item}</span>`).join('')}
                    </div>
                </div>
            `).join('');

            // Expertise
            document.getElementById('expertise-container').innerHTML = CONFIG.expertise.map(e => `
                <div class="p-3 border border-slate-700 bg-slate-800/50 rounded-md">
                    <h4 class="text-slate-200 font-medium mb-1">${e.title}</h4>
                    <p class="text-slate-400 text-sm">${e.desc}</p>
                </div>
            `).join('');

            // Bio & Availability
            document.getElementById('bio-container').innerHTML = CONFIG.bio.map((p, i) => 
                `<p class="${i === 0 ? 'text-lg leading-relaxed mb-6' : 'mb-6'}">${p}</p>`
            ).join('');
            
            document.getElementById('availability-container').innerHTML = CONFIG.availability.map(a => 
                `<li>${a}</li>`
            ).join('');

            lucide.createIcons(); // Initialize Icons
        }

        // Tab Switching Logic
        function switchTab(tabId) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Remove active state from all buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600/10', 'text-blue-400', 'border-r-2', 'border-blue-500');
                btn.classList.add('text-slate-400');
            });

            // Show selected tab
            document.getElementById('tab-' + tabId).classList.add('active');
            
            // Add active state to clicked button
            let activeBtn = document.getElementById('nav-' + tabId);
            activeBtn.classList.remove('text-slate-400');
            activeBtn.classList.add('bg-blue-600/10', 'text-blue-400', 'border-r-2', 'border-blue-500');

            // Update page title
            const titles = { 'dashboard': 'Active Investigations', 'intel': 'Intelligence & Tooling', 'dossier': 'Analyst Dossier' };
            document.getElementById('page-title').innerText = titles[tabId];
        }

        // Boot up
        window.onload = renderData;
    </script>
</body>
</html>
